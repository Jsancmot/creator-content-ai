version: '3.8'

services:
  instagram-agent:
    build: .
    container_name: instagram-agent
    env_file:
      - .env
    volumes:
      - ./processed_images.json:/app/processed_images.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s